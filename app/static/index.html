<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | K8s AIOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 750: '#334155', 850: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen selection:bg-blue-500 selection:text-white pb-10">

    <!-- Top Navigation -->
    <nav class="bg-gray-850 p-4 border-b border-gray-800 shadow-xl sticky top-0 z-40 backdrop-blur-md bg-opacity-90">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div class="font-bold text-xl tracking-tight text-white">K8s AIOps <span class="text-blue-500 font-medium">Agent</span></div>
            </div>
            
            <div class="flex items-center space-x-5">
                <div class="flex items-center space-x-2 text-sm bg-gray-900 px-3 py-1.5 rounded-full border border-gray-700 shadow-inner">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                    <span class="text-gray-300 font-medium">Connected</span>
                </div>
                <div class="flex items-center space-x-2 text-sm bg-gray-900 px-3 py-1.5 rounded-full border border-gray-700 shadow-inner">
                    <span class="text-gray-400">NS:</span>
                    <span class="text-blue-400 font-mono font-medium">default</span>
                </div>
                <div class="w-px h-6 bg-gray-700 mx-2"></div>
                <a href="/static/profile.html" class="flex items-center space-x-2 group hover:bg-gray-800 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">
                    <div class="w-7 h-7 rounded-full bg-gray-700 flex items-center justify-center border border-gray-600 group-hover:border-blue-500 transition-colors">
                        <svg class="w-4 h-4 text-gray-300 group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <span class="font-medium text-gray-300 group-hover:text-white transition-colors" id="activeUserDisplay">admin</span>
                </a>
                <button id="logoutBtn" class="flex items-center space-x-2 bg-gray-800 border border-gray-700 px-3 py-1.5 rounded-lg hover:bg-rose-600 hover:border-rose-500 hover:text-white transition-all duration-300 text-gray-300 font-medium shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="text-sm">Logout</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 mt-10 max-w-6xl relative z-10">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold text-white tracking-tight">Cluster Overview</h1>
                <p class="text-gray-400 mt-2 text-sm">Real-time telemetry powered by Prometheus.</p>
            </div>
            
            <div class="flex flex-col space-y-2 lg:flex-row lg:space-y-0 lg:space-x-4 items-end">
                <div class="flex flex-col">
                    <label class="text-xs text-gray-400 font-medium mb-1 ml-1 uppercase tracking-wider">Metric</label>
                    <select id="metricSelector" class="bg-gray-850 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-36 p-2.5 shadow-lg outline-none cursor-pointer">
                        <option value="cpu" selected>CPU</option>
                        <option value="memory">Memory</option>
                        <option value="network_receive">Net Rx</option>
                        <option value="network_transmit">Net Tx</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs text-gray-400 font-medium mb-1 ml-1 uppercase tracking-wider">Time Range</label>
                    <select id="timeRangeSelector" class="bg-gray-850 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-40 p-2.5 shadow-lg outline-none cursor-pointer">
                        <option value="5" selected>Last 5 Minutes</option>
                        <option value="60">Last 1 Hour</option>
                        <option value="1440">Last 24 Hours</option>
                        <option value="10080">Last 7 Days</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs text-gray-400 font-medium mb-1 ml-1 uppercase tracking-wider">Select Pod to Monitor</label>
                    <select id="podSelector" class="bg-gray-850 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-64 p-2.5 shadow-lg outline-none cursor-pointer">
                        <option value="" disabled selected>Loading pods...</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Chart Container -->
        <div class="bg-gray-850 rounded-xl border border-gray-800 shadow-2xl p-6 relative">
            
            <div id="chartLoadingOverlay" class="absolute inset-0 bg-gray-850/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center rounded-xl hidden">
                <svg class="animate-spin w-10 h-10 text-blue-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <div class="text-blue-400 font-medium animate-pulse text-sm tracking-wide">QUERYING PROMETHEUS...</div>
            </div>

            <div class="flex items-center justify-between mb-4 px-2">
                <h2 id="chartTitle" class="text-lg font-bold text-white flex items-center">
                    <svg class="w-5 h-5 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    <span>Pod CPU Usage (vCores)</span>
                </h2>
                <div id="chartTimeLabel" class="text-xs font-mono text-gray-500 bg-gray-900 px-2 py-1 rounded border border-gray-800">Last 5 Minutes</div>
            </div>

            <div class="relative h-[350px] w-full">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Glow -->
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-900 rounded-full blur-[150px] opacity-20 pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-indigo-900 rounded-full blur-[150px] opacity-20 pointer-events-none z-0"></div>

    <script src="/static/js/toast.js"></script>
    <script type="module" src="/static/js/dashboard.js"></script>
</body>
</html>
