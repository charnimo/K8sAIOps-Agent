Summary Cards Row 
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="summaryCardsContainer">
   <div class="bg-gray-850 rounded-xl border border-gray-800 shadow-lg p-5">
      <div class="text-gray-400 text-sm font-medium uppercase tracking-wider mb-1">Total Pods</div>
      <div class="text-3xl font-bold text-white flex items-baseline" id="cardPods">...</div>
   </div>
   <div class="bg-gray-850 rounded-xl border border-gray-800 shadow-lg p-5">
      <div class="text-gray-400 text-sm font-medium uppercase tracking-wider mb-1">Deployments</div>
      <div class="text-3xl font-bold text-white flex items-baseline" id="cardDeployments">...</div>
   </div>
   <div class="bg-gray-850 rounded-xl border border-gray-800 shadow-lg p-5">
      <div class="text-gray-400 text-sm font-medium uppercase tracking-wider mb-1">Services</div>
      <div class="text-3xl font-bold text-white flex items-baseline" id="cardServices">...</div>
   </div>
   <div class="bg-gray-850 rounded-xl border border-rose-900 shadow-lg p-5 relative overflow-hidden">
      <div class="absolute right-[-10px] top-[-10px] w-16 h-16 bg-rose-600 rounded-full blur-[20px] opacity-20"></div>
      <div class="text-rose-400 text-sm font-medium uppercase tracking-wider mb-1">Active Issues</div>
      <div class="text-3xl font-bold text-rose-500 flex items-baseline" id="cardIssues">...</div>
   </div>
</div>
The Chart Section 
<h2 class="text-lg font-bold text-white mb-4 tracking-tight flex items-center">
   <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
      <path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
   </svg>
   Workload Telemetry
</h2>
<div class="bg-gray-850 rounded-xl border border-gray-800 shadow-xl p-6 relative mb-10">
   <header class="mb-6 pb-6 border-b border-gray-800 flex flex-col xl:flex-row justify-between xl:items-end">
      <div class="mb-4 xl:mb-0">
         <p class="text-gray-400 text-sm">Real-time container telemetry powered by Prometheus.</p>
      </div>
      <div class="flex flex-col space-y-2 xl:flex-row xl:space-y-0 xl:space-x-4 items-end">
         <div class="flex flex-col">
            <label class="text-xs text-gray-400 font-medium mb-1 ml-1 uppercase tracking-wider">Metric</label>
            <select class="bg-gray-850 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-36 p-2.5 shadow-lg outline-none cursor-pointer" id="metricSelector">
               <option selected="" value="cpu">CPU</option>
               <option value="memory">Memory</option>
               <option value="network_receive">Net Rx</option>
               <option value="network_transmit">Net Tx</option>
            </select>
         </div>
         <div class="flex flex-col">
            <label class="text-xs text-gray-400 font-medium mb-1 ml-1 uppercase tracking-wider">Time Range</label>
            <select class="bg-gray-850 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-40 p-2.5 shadow-lg outline-none cursor-pointer" id="timeRangeSelector">
               <option selected="" value="5">Last 5 Minutes</option>
               <option value="60">Last 1 Hour</option>
               <option value="1440">Last 24 Hours</option>
               <option value="10080">Last 7 Days</option>
            </select>
         </div>
         <div class="flex flex-col">
            <label class="text-xs text-gray-400 font-medium mb-1 ml-1 uppercase tracking-wider">Select Pod to Monitor</label>
            <select class="bg-gray-850 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 w-64 p-2.5 shadow-lg outline-none cursor-pointer" id="podSelector">
               <option disabled="" selected="" value="">Loading pods...</option>
            </select>
         </div>
      </div>
   </header>
   <div class="absolute inset-0 bg-gray-850/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center rounded-xl hidden" id="chartLoadingOverlay">
      <svg class="animate-spin w-10 h-10 text-blue-500 mb-3" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
         <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
         <path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
      </svg>
      <div class="text-blue-400 font-medium animate-pulse text-sm tracking-wide">QUERYING PROMETHEUS...</div>
   </div>
   <div class="flex items-center justify-between mb-4 px-2">
      <h2 class="text-lg font-bold text-white flex items-center" id="chartTitle">
         <span>Pod CPU Usage (vCores)</span>
      </h2>
      <div class="text-xs font-mono text-gray-500 bg-gray-900 px-2 py-1 rounded border border-gray-800" id="chartTimeLabel">Last 5 Minutes</div>
   </div>
   <div class="relative h-[300px] w-full">
      <canvas id="cpuChart"></canvas>
   </div>
</div>
