<div class="space-y-4">
   <div class="flex items-center justify-between gap-3 flex-wrap">
      <div>
         <h2 class="text-lg font-bold text-white tracking-tight flex items-center gap-2">
            <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M4 5h16a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V6a1 1 0 011-1z"></path>
            </svg>
            Cluster Terminal
         </h2>
         <p class="text-sm text-gray-400 mt-1">Real-time read-only kubectl terminal over WebSocket. Commands run in an isolated backend sandbox.</p>
      </div>
      <div class="text-xs text-gray-300 border border-cyan-700/40 bg-cyan-900/20 rounded-lg px-3 py-2" id="terminalConnectionStatus">Connecting...</div>
   </div>

   <div class="bg-gray-850 rounded-xl border border-gray-800 shadow-xl overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
         <div class="text-xs uppercase tracking-wider text-gray-500">Quick Commands</div>
         <button id="terminalClearBtn" class="text-xs font-medium text-gray-300 border border-gray-700 hover:border-gray-500 px-2.5 py-1 rounded-md">Clear</button>
      </div>
      <div class="px-4 py-3 flex flex-wrap gap-2" id="terminalQuickCommands">
         <button class="terminal-chip px-2.5 py-1 text-xs rounded-md border border-gray-700 bg-gray-900 text-gray-300 hover:text-white" data-command="get nodes -o wide">get nodes -o wide</button>
         <button class="terminal-chip px-2.5 py-1 text-xs rounded-md border border-gray-700 bg-gray-900 text-gray-300 hover:text-white" data-command="get namespaces">get namespaces</button>
         <button class="terminal-chip px-2.5 py-1 text-xs rounded-md border border-gray-700 bg-gray-900 text-gray-300 hover:text-white" data-command="get pods -A">get pods -A</button>
         <button class="terminal-chip px-2.5 py-1 text-xs rounded-md border border-gray-700 bg-gray-900 text-gray-300 hover:text-white" data-command="top nodes">top nodes</button>
         <button class="terminal-chip px-2.5 py-1 text-xs rounded-md border border-gray-700 bg-gray-900 text-gray-300 hover:text-white" data-command="events -A --sort-by=.lastTimestamp">events -A --sort-by=.lastTimestamp</button>
      </div>
   </div>

   <div class="bg-black border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
      <div id="terminalOutput" class="h-[60vh] overflow-y-auto p-4 text-sm font-mono leading-6 text-gray-200 whitespace-pre-wrap"></div>
      <div class="border-t border-gray-800 bg-gray-950 p-3">
         <form id="terminalCommandForm" class="flex items-center gap-2">
            <span class="text-cyan-400 font-mono text-sm">kubectl&gt;</span>
            <input id="terminalCommandInput" autocomplete="off" class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-cyan-500" placeholder="get pods -A" />
            <button id="terminalRunBtn" type="submit" class="bg-cyan-600 hover:bg-cyan-700 disabled:bg-gray-700 disabled:text-gray-400 text-white text-sm font-medium px-4 py-2 rounded-lg border border-cyan-500/40 transition-colors">Run</button>
         </form>
      </div>
   </div>
</div>
