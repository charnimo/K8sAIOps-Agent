<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | K8s AIOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Welcome Back</h2>
        <!-- Using standard form encoding because OAuth2PasswordRequestForm expects form data, not JSON -->
        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" name="username" placeholder="Username" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input type="password" id="password" name="password" placeholder="Password" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition">Log In</button>
        </form>
        <p class="text-sm text-center text-gray-600 mt-4">Don't have an account? <a href="/static/signup.html" class="text-blue-500 hover:underline">Sign up</a></p>
    </div>

    <script>
        // Redirect to dashboard if already logged in
        if (localStorage.getItem("jwt_token")) {
            window.location.href = "/";
        }
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append("username", document.getElementById('username').value);
            formData.append("password", document.getElementById('password').value);

            const response = await fetch('/auth/login', {
                method: 'POST',
                body: new URLSearchParams(formData)
            });

            if (response.ok) {
                const data = await response.json();
                // Save the JWT token in LocalStorage
                localStorage.setItem("jwt_token", data.access_token);
                // Redirect back to the dashboard
                window.location.href = "/";
            } else {
                alert("Login failed. Check your credentials.");
            }
        });
    </script>
</body>
</html>
