<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | K8s AIOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            750: '#334155',
                            850: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen text-gray-200 selection:bg-blue-500 selection:text-white">
    
    <!-- Toast container placeholder (handled by toast.js) -->
    
    <div class="bg-gray-850 p-8 rounded-xl shadow-2xl border border-gray-750 w-full max-w-md relative overflow-hidden">
        <!-- Subtle Glow Effect -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600 rounded-full blur-3xl opacity-20 pointer-events-none"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-600 rounded-full blur-3xl opacity-20 pointer-events-none"></div>

        <h2 class="text-3xl font-extrabold text-center text-white mb-8 tracking-tight">Welcome Back<span class="text-blue-500">.</span></h2>
        
        <form id="loginForm" class="space-y-6 relative z-10">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" id="username" name="username" placeholder="Enter username" required 
                        class="w-full pl-10 pr-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300">
                </div>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input type="password" id="password" name="password" placeholder="Enter password" required 
                        class="w-full pl-10 pr-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:from-blue-500 hover:to-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-850 focus:ring-blue-500 transform transition-all duration-300 hover:scale-[1.02] shadow-lg">
                Log In
            </button>
        </form>
        
        <p class="text-sm text-center text-gray-400 mt-6 font-medium relative z-10">
            Don't have an account? <a href="/static/signup.html" class="text-blue-400 hover:text-blue-300 hover:underline transition-colors">Sign up</a>
        </p>
    </div>

    <script src="/static/js/toast.js"></script>
    <script>
        // Redirect to dashboard if already logged in
        if (localStorage.getItem("jwt_token")) {
            window.location.href = "/";
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...`;
            btn.disabled = true;

            const formData = new FormData();
            formData.append("username", document.getElementById('username').value);
            formData.append("password", document.getElementById('password').value);

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("jwt_token", data.access_token);
                    window.showToast("Login successful! Redirecting...", "success");
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 800);
                } else {
                    const err = await response.json();
                    window.showToast(err.detail || "Login failed. Check your credentials.", "error");
                }
            } catch (err) {
                window.showToast("Connection error. Is the server running?", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
